<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Győr Menü</title>
  <meta name="description" content="Győri napi menük egy helyen.">
  <link rel="stylesheet" href="./styles.css?v=20260604a">
</head>
<body>
  <div class="app-shell">
    <header class="hero compact-hero">
      <div class="hero-row">
        <h1>Mi a menü?</h1>
        <div class="hero-meta">
          <div class="meta-pill"><span>🏙️</span><strong>Győr</strong></div>
          <div class="meta-pill"><span>⏱️</span><span id="generated-at">Betöltés…</span></div>
        </div>
      </div>
    </header>

    <section class="day-tabs-panel">
      <div class="weekday-tabs" id="weekday-tabs" role="tablist" aria-label="Hét napjai">
        <button class="weekday-tab" data-day-index="0">Hétfő</button>
        <button class="weekday-tab" data-day-index="1">Kedd</button>
        <button class="weekday-tab" data-day-index="2">Szerda</button>
        <button class="weekday-tab" data-day-index="3">Csütörtök</button>
        <button class="weekday-tab" data-day-index="4">Péntek</button>
        <button class="weekday-tab" data-day-index="5">Szombat</button>
        <button class="weekday-tab" data-day-index="6">Vasárnap</button>
      </div>
    </section>

    <section class="favorites-panel compact-panel">
      <div class="panel-head">
        <div>
          <h2>Kedvenc helyeim</h2>
          <p>Jelöld be az éttermeket, amiket gyakran nézel. Ezek előrébb kerülnek.</p>
        </div>
        <button id="favorites-reset" class="secondary-btn" type="button">Törlés</button>
      </div>
      <div class="favorite-list" id="favorite-list"></div>
    </section>

    <main>
      <section class="cards" id="cards"></section>
      <section class="cards" id="unsupported"></section>
      <section class="bottom-legend">
        <div class="legend-item-inline"><span class="trust-check trust-exact">✓</span><span>Ellenőrzött menü — pontos, heti forrásból</span></div>
        <div class="legend-item-inline"><span class="trust-check trust-snapshot">◷</span><span>Élő forrásból — indulás előtt nézz rá az eredetire</span></div>
        <div class="legend-item-inline"><span class="trust-check trust-manual">⚡</span><span>Kézi ellenőrzéssel — screenshotból vagy manuálisan felvéve</span></div>
      </section>
      <section class="site-footer">
        <a href="./adatkezeles.html">Adatkezelési tájékoztató</a>
      </section>
    </main>
  </div>
  <script src="./app.js?v=20260607b" defer></script>
</body>
</html>
